<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="280" viewBox="0 0 1200 280" role="img" aria-labelledby="title desc">
  <title id="title">Skill Workflow</title>
  <desc id="desc">Five-step workflow from source concepts to portable skills, resources, validation, and AI-assisted use.</desc>
  <defs>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#f6fbff"/>
      <stop offset="100%" stop-color="#eef7f2"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#698197"/>
    </marker>
  </defs>
  <rect width="1200" height="280" fill="#ffffff"/>
  <text x="600" y="44" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700" fill="#17324d">Repository Workflow</text>
  <text x="600" y="72" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#5b6f84">How concepts become validated, reusable skills for AI-assisted implementation</text>

  <g font-family="Segoe UI, Arial, sans-serif">
    <rect x="40" y="110" width="190" height="110" rx="22" fill="url(#panel)" stroke="#d5e3ef"/>
    <text x="135" y="148" text-anchor="middle" font-size="20" font-weight="700" fill="#17324d">1. Concepts</text>
    <text x="135" y="176" text-anchor="middle" font-size="14" fill="#486581">Source material in</text>
    <text x="135" y="198" text-anchor="middle" font-size="14" fill="#486581">CONCEPTOS-FRONTEND-</text>
    <text x="135" y="216" text-anchor="middle" font-size="14" fill="#486581">BACKEND</text>

    <rect x="275" y="110" width="190" height="110" rx="22" fill="url(#panel)" stroke="#d5e3ef"/>
    <text x="370" y="148" text-anchor="middle" font-size="20" font-weight="700" fill="#17324d">2. Skills</text>
    <text x="370" y="176" text-anchor="middle" font-size="14" fill="#486581">Portable bilingual</text>
    <text x="370" y="198" text-anchor="middle" font-size="14" fill="#486581">SKILL.md files</text>

    <rect x="510" y="110" width="190" height="110" rx="22" fill="url(#panel)" stroke="#d5e3ef"/>
    <text x="605" y="148" text-anchor="middle" font-size="20" font-weight="700" fill="#17324d">3. Resources</text>
    <text x="605" y="176" text-anchor="middle" font-size="14" fill="#486581">Templates, matrices,</text>
    <text x="605" y="198" text-anchor="middle" font-size="14" fill="#486581">checklists, schemas</text>

    <rect x="745" y="110" width="190" height="110" rx="22" fill="url(#panel)" stroke="#d5e3ef"/>
    <text x="840" y="148" text-anchor="middle" font-size="20" font-weight="700" fill="#17324d">4. Validation</text>
    <text x="840" y="176" text-anchor="middle" font-size="14" fill="#486581">Links, structure,</text>
    <text x="840" y="198" text-anchor="middle" font-size="14" fill="#486581">JSON, repo integrity</text>

    <rect x="980" y="110" width="180" height="110" rx="22" fill="url(#panel)" stroke="#d5e3ef"/>
    <text x="1070" y="148" text-anchor="middle" font-size="20" font-weight="700" fill="#17324d">5. Use</text>
    <text x="1070" y="176" text-anchor="middle" font-size="14" fill="#486581">AI assistant reads</text>
    <text x="1070" y="198" text-anchor="middle" font-size="14" fill="#486581">the selected skill</text>
  </g>

  <line x1="230" y1="165" x2="275" y2="165" stroke="#698197" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="465" y1="165" x2="510" y2="165" stroke="#698197" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="700" y1="165" x2="745" y2="165" stroke="#698197" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="935" y1="165" x2="980" y2="165" stroke="#698197" stroke-width="4" marker-end="url(#arrow)"/>
</svg>
