<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="540" viewBox="0 0 1200 540" role="img" aria-labelledby="title desc">
  <title id="title">Universal Full-Stack Skills Overview</title>
  <desc id="desc">Diagram showing the repository as a frontend and backend skill library with validation, alignment, and security documentation.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f5f7fb"/>
      <stop offset="100%" stop-color="#ecf3ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#9fb3c8" flood-opacity="0.25"/>
    </filter>
  </defs>
  <rect width="1200" height="540" fill="url(#bg)"/>
  <text x="600" y="62" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700" fill="#17324d">Universal Full-Stack Skills</text>
  <text x="600" y="96" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="#486581">24 bilingual skills, support resources, validator, and publication guidance</text>

  <rect x="70" y="140" width="500" height="280" rx="24" fill="#ffffff" filter="url(#shadow)"/>
  <rect x="630" y="140" width="500" height="280" rx="24" fill="#ffffff" filter="url(#shadow)"/>
  <rect x="170" y="452" width="860" height="54" rx="18" fill="#17324d"/>

  <text x="320" y="188" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#0b5ed7">Frontend Skills</text>
  <text x="320" y="218" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#5b6f84">12 portable client-side playbooks</text>
  <text x="120" y="262" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#17324d">• setup and environment hygiene</text>
  <text x="120" y="296" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#17324d">• component architecture and routing</text>
  <text x="120" y="330" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#17324d">• forms, feedback, styling, and state</text>
  <text x="120" y="364" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#17324d">• data fetching, BaaS, auth, and guards</text>

  <text x="880" y="188" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#198754">Backend Skills</text>
  <text x="880" y="218" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#5b6f84">12 portable server-side playbooks</text>
  <text x="680" y="262" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#17324d">• bootstrap, structure, and REST design</text>
  <text x="680" y="296" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#17324d">• services, persistence, DTOs, and errors</text>
  <text x="680" y="330" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#17324d">• relationships, querying, auth, and RBAC</text>
  <text x="680" y="364" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#17324d">• deployment, observability, and rollback</text>

  <text x="600" y="486" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="19" font-weight="600" fill="#ffffff">Supported by GUIDE_ALIGNMENT, SECURITY, validation tooling, GitHub Actions, and resource templates</text>
</svg>
